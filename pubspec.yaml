name: resortconnectapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase & Auth
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  firebase_database: ^11.1.1
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.1

  # Media & Hardware
  image_picker: ^1.1.2
  video_player: ^2.8.1
  chewie: ^1.7.1
  cached_network_image: ^3.4.1

  # QR Code & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4
  share_plus: ^10.1.4

  # UI & UX Improvements
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  table_calendar: ^3.1.2
  fl_chart: ^0.71.0
  provider: ^6.1.2
  google_fonts: ^6.2.1

  # Utilities
  http: ^1.2.1
  intl: ^0.19.0
  encrypt: ^5.0.3
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.2

  crypto: any
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/ResortConnectLogo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/ResortConnectLogo.png
